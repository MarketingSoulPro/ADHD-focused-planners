        <script src="../js/planner-interactive.js?v=3" defer></script>
        <script src="../js/stuck-buddy.js" defer></script>
    </head>

    <body>
        <!-- Planner Page Container -->
        <div class="planner-page">
            <!-- Decorative Corner Elements -->
            <div class="corner-decor top-left"></div>
            <div class="corner-decor top-right"></div>
            <div class="corner-decor bottom-left"></div>

            <!-- Month Tabs -->

                <div class="month-tab feb">Feb</div>
                <div class="month-tab mar">Mar</div>
                <div class="month-tab apr">Apr</div>
                <div class="month-tab may">May</div>
                <div class="month-tab jun">Jun</div>
                <div class="month-tab jul">Jul</div>
                <div class="month-tab aug">Aug</div>
                <div class="month-tab sep">Sep</div>
                <div class="month-tab oct">Oct</div>
                <div class="month-tab nov">Nov</div>
                <div class="month-tab dec">Dec</div>
            </div>

            <!-- Header -->
            <div class="daily-header" style="margin-bottom: 8px">
                <div>
                    <h1

                        style="margin: 0; line-height: 1"

                        Quick Reminders
                    </h1>
                    <div class="habit-tracker-month" style="margin-top: 4px">

                    </div>
                </div>

                <div
                    style="
                        display: flex;
                        flex-direction: column;
                        align-items: flex-end;
                        gap: 8px;
                    "
                >
                    <div class="nav-icons">
                        <a

                                    stroke="currentColor"

                                <path

                    </div>
                    <div class="week-date-bar">
                        <div class="week-badge" id="week-badge">
                            WEEK <span id="week-number"></span>
                        </div>
                        <div class="date-text" id="date-display">
                            SELECTED: <span id="date-string"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Grid Content -->
            <div class="qr-page-grid">
                <!-- 1. Add Reminder Form -->
                <div class="qr-add-box">
                    <div class="section-label-accent">Add New Reminder</div>
                    <div class="qr-form-row">
                        <div class="qr-input-group" style="flex: 2">
                            <label class="qr-label">Reminder Note</label>
                            <input
                                type="text"
                                id="qr-note"
                                class="qr-input"
                                placeholder="What do you need to remember?"
                            />
                        </div>
                        <div class="qr-input-group">
                            <label class="qr-label">Date</label>
                            <input type="text" id="qr-date" class="qr-input" placeholder="YYYY-MM-DD" readonly>
                        </div>
                        <div class="qr-input-group">
                            <label class="qr-label">Time</label>
                            <input type="text" id="qr-time" class="qr-input" placeholder="HH:MM" readonly>
                        </div>
                        <div class="qr-input-group">
                            <label class="qr-label">Repeat</label>
                            <select id="qr-repeat" class="qr-input">
                                <option value="">None</option>
                                <option value="Daily">Daily</option>
                                <option value="Weekly">Weekly</option>
                                <option value="Monthly">Monthly</option>
                                <option value="Yearly">Yearly</option>
                            </select>
                        </div>
                        <button class="qr-btn" id="qr-add-btn">Add</button>
                    </div>
                </div>

                <!-- 2. Active & Completed Lists -->
                <div class="qr-lists-grid">
                    <div class="qr-list-box">
                        <div class="section-label-accent">Active Reminders</div>
                        <div
                            id="qr-active-list"
                            class="qr-items-container"
                        ></div>
                    </div>

                    <div class="qr-list-box">
                        <div
                            class="section-label"
                            style="color: var(--text-muted)"
                        >
                            Completed Reminders
                        </div>
                        <div
                            id="qr-completed-list"
                            class="qr-items-container"
                        ></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Local Script for Reminder Logic -->
        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const activeList = document.getElementById("qr-active-list");
                const completedList =
                    document.getElementById("qr-completed-list");
                const addBtn = document.getElementById("qr-add-btn");

                const noteInp = document.getElementById("qr-note");
                const dateInp = document.getElementById("qr-date");
                const timeInp = document.getElementById("qr-time");
                const repeatInp = document.getElementById("qr-repeat");

                let editingId = null;

                // ── Custom themed pickers ──
                var dp = null, tp = null;
                var calM = new Date().getMonth(), calY = new Date().getFullYear();
                var MON = ['January','February','March','April','May','June','July','August','September','October','November','December'];

                function buildDP() {
                    dp = document.createElement('div');
                    dp.className = 'qr-dtp';
                    dp.id = 'qr-dp';
                    dp.innerHTML =
                        '<div class="qr-dtp-nav">' +
                            '<span class="qr-dtp-navb" data-dir="-1">\u25C0</span>' +
                            '<span class="qr-dtp-nav-l"></span>' +
                            '<span class="qr-dtp-navb" data-dir="1">\u25B6</span>' +
                        '</div>' +
                        '<div class="qr-dtp-g" id="qr-dp-g"></div>';
                    dateInp.parentNode.appendChild(dp);

                    dp.querySelector('.qr-dtp-nav').onclick = function(e){
                        var b = e.target.closest('.qr-dtp-navb');
                        if(!b) return;
                        e.stopPropagation();
                        calM += parseInt(b.dataset.dir);
                        if(calM < 0){ calM = 11; calY--; }
                        if(calM > 11){ calM = 0; calY++; }
                        renderDP();
                    };

                    dp.querySelector('.qr-dtp-g').onclick = function(e){
                        var d = e.target.closest('[data-v]');
                        if(!d) return;
                        dateInp.value = d.dataset.v;
                        dp.classList.remove('o');
                        if(tp) tp.classList.remove('o');
                    };
                }

                function renderDP() {
                    var t = new Date();
                    var f = new Date(calY, calM, 1).getDay();
                    var dim = new Date(calY, calM + 1, 0).getDate();
                    var dip = new Date(calY, calM, 0).getDate();
                    var s = dateInp.value || '';

                    dp.querySelector('.qr-dtp-nav-l').textContent = MON[calM] + ' ' + calY;

                    var h = '';
                    'Su,Mo,Tu,We,Th,Fr,Sa'.split(',').forEach(function(d){ h += '<div class="qr-dtp-dow">' + d + '</div>'; });

                    for(var i = f - 1; i >= 0; i--){
                        var d = dip - i, m = calM === 0 ? 11 : calM - 1, y = calM === 0 ? calY - 1 : calY;
                        h += '<div class="qr-dtp-d o" data-v="' + y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0') + '">' + d + '</div>';
                    }
                    for(var d = 1; d <= dim; d++){
                        var v = calY + '-' + String(calM+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
                        var cl = 'qr-dtp-d';
                        if(d === t.getDate() && calM === t.getMonth() && calY === t.getFullYear()) cl += ' td';
                        if(v === s) cl += ' sel';
                        h += '<div class="' + cl + '" data-v="' + v + '">' + d + '</div>';
                    }
                    var rem = (7 - (f + dim) % 7) % 7;
                    for(var d = 1; d <= rem; d++){
                        var m = calM === 11 ? 0 : calM + 1, y = calM === 11 ? calY + 1 : calY;
                        h += '<div class="qr-dtp-d o" data-v="' + y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0') + '">' + d + '</div>';
                    }
                    dp.querySelector('.qr-dtp-g').innerHTML = h;
                }

                var tp_h = 12, tp_m = 0, tp_ap = 'AM';

                function tpSetDisplay(){
                    document.getElementById('tp-h').textContent = String(tp_h).padStart(2,'0');
                    document.getElementById('tp-m').textContent = String(tp_m).padStart(2,'0');
                    document.querySelectorAll('.qr-tp-ap').forEach(function(el){
                        el.classList.toggle('sel', el.dataset.ap === tp_ap);
                    });
                }

                function buildTP() {
                    tp = document.createElement('div');
                    tp.className = 'qr-dtp qr-dtp-tp';
                    tp.id = 'qr-tp';
                    tp.innerHTML =
                        '<div class="qr-tp-col qr-tp-col-h">' +
                            '<button class="qr-tp-btn" data-t="h" data-d="-1">\u25B2</button>' +
                            '<span class="qr-tp-num" id="tp-h">12</span>' +
                            '<button class="qr-tp-btn" data-t="h" data-d="1">\u25BC</button>' +
                        '</div>' +
                        '<div class="qr-tp-col qr-tp-col-c">' +
                            '<span></span>' +
                            '<span class="qr-tp-colon">:</span>' +
                            '<span></span>' +
                        '</div>' +
                        '<div class="qr-tp-col qr-tp-col-m">' +
                            '<button class="qr-tp-btn" data-t="m" data-d="-1">\u25B2</button>' +
                            '<span class="qr-tp-num" id="tp-m">00</span>' +
                            '<button class="qr-tp-btn" data-t="m" data-d="1">\u25BC</button>' +
                        '</div>' +
                        '<div class="qr-tp-col qr-tp-col-ap">' +
                            '<span class="qr-tp-ap" data-ap="AM">AM</span>' +
                            '<span class="qr-tp-ap" data-ap="PM">PM</span>' +
                            '<button class="qr-tp-done" id="tp-ok">OK</button>' +
                        '</div>';
                    timeInp.parentNode.appendChild(tp);

                    tp.onclick = function(e){
                        var btn = e.target.closest('.qr-tp-btn');
                        if(btn){
                            e.stopPropagation();
                            var t = btn.dataset.t;
                            var d = parseInt(btn.dataset.d, 10);
                            if(t === 'h'){
                                tp_h += d;
                                if(tp_h > 12) tp_h = 1;
                                if(tp_h < 1) tp_h = 12;
                            } else {
                                tp_m += d * 5;
                                if(tp_m >= 60) tp_m = 0;
                                if(tp_m < 0) tp_m = 55;
                            }
                            tpSetDisplay();
                            return;
                        }
                        var ap = e.target.closest('.qr-tp-ap');
                        if(ap){
                            e.stopPropagation();
                            tp_ap = ap.dataset.ap;
                            tpSetDisplay();
                            return;
                        }
                        var ok = e.target.closest('#tp-ok');
                        if(ok){
                            e.stopPropagation();
                            var h24 = tp_ap === 'PM' ? (tp_h === 12 ? 12 : tp_h + 12) : (tp_h === 12 ? 0 : tp_h);
                            var v24 = String(h24).padStart(2,'0') + ':' + String(tp_m).padStart(2,'0');
                            timeInp.value = fmt12(v24);
                            tp.classList.remove('o');
                            if(dp) dp.classList.remove('o');
                        }
                    };

                    tpSetDisplay();
                }

                function fmt12(v){
                    if(!v) return '';
                    var p = v.split(':');
                    var h = parseInt(p[0], 10), m = p[1];
                    var ampm = h >= 12 ? 'PM' : 'AM';
                    var hr = h % 12 || 12;
                    return hr + ':' + m + ' ' + ampm;
                }

                function fmt24(v){
                    if(!v) return '';
                    var p = v.split(' ');
                    if(p.length < 2) return v;
                    var t = p[0].split(':');
                    var h = parseInt(t[0], 10), m = t[1];
                    var ampm = p[1].toUpperCase();
                    if(ampm === 'PM' && h !== 12) h += 12;
                    if(ampm === 'AM' && h === 12) h = 0;
                    return String(h).padStart(2,'0') + ':' + m;
                }

                buildDP(); buildTP();

                dateInp.onclick = function(e){
                    e.stopPropagation();
                    if(tp) tp.classList.remove('o');
                    var d = dateInp.value ? new Date(dateInp.value + 'T00:00') : new Date();
                    calM = d.getMonth(); calY = d.getFullYear();
                    renderDP();
                    dp.classList.toggle('o');
                };

                function syncTPtoInput(){
                    var v = timeInp.value || '';
                    var v24 = fmt24(v);
                    if(v24){
                        var p = v24.split(':');
                        var hh = parseInt(p[0], 10);
                        tp_ap = hh < 12 ? 'AM' : 'PM';
                        tp_h = hh % 12 || 12;
                        tp_m = parseInt(p[1], 10);
                    }
                    tpSetDisplay();
                }

                timeInp.onclick = function(e){
                    e.stopPropagation();
                    if(dp) dp.classList.remove('o');
                    syncTPtoInput();
                    tp.classList.toggle('o');
                };

                document.addEventListener('click', function(){
                    if(dp) dp.classList.remove('o');
                    if(tp) tp.classList.remove('o');
                });

                // Init defaults
                {
                    var now = new Date();
                    dateInp.value = now.toISOString().split('T')[0];
                    var h = now.getHours(), m = now.getMinutes();
                    var rounded = String(Math.round(m / 5) * 5).padStart(2,'0');
                    if(rounded === '60') rounded = '00';
                    var v24 = String(h).padStart(2,'0') + ':' + rounded;
                    timeInp.value = fmt12(v24);
                }



                // Load data independently so this page manages itself beautifully
                let reminders = JSON.parse(
                    localStorage.getItem("planner-quick-reminders") || "[]",
                );

                function saveAndRender() {
                    localStorage.setItem(
                        "planner-quick-reminders",
                        JSON.stringify(reminders),
                    );
                    render();
                }

                function render() {
                    activeList.innerHTML = "";
                    completedList.innerHTML = "";

                    // Sort chronologically
                    reminders.sort(
                        (a, b) =>
                            new Date(`${a.date} ${a.time || "00:00"}`) -
                            new Date(`${b.date} ${b.time || "00:00"}`),
                    );

                    reminders.forEach((rem) => {
                        const item = document.createElement("div");
                        item.className = `qr-item ${rem.completed ? "completed" : ""}`;

                        let dateTimeStr = rem.date;
                        if (rem.time) {
                            const [h, m] = rem.time.split(":");
                            const ampm = h >= 12 ? "PM" : "AM";
                            const hr = h % 12 || 12;
                            dateTimeStr += ` at ${hr}:${m} ${ampm}`;
                        }

                        if (rem.repeat) {
                            dateTimeStr += ` <span style="color:var(--accent-3); font-size:0.9em; font-weight:700;">&#128257; ${rem.repeat}</span>`;
                        }

                        item.innerHTML = `
            <div class="qr-chk ${rem.completed ? "done" : ""}" data-id="${rem.id}">
              ${rem.completed ? "✓" : ""}
            </div>
            <div class="qr-item-text">
              <div style="font-size: 11px;">${rem.note}</div>
              <div class="qr-item-date">${dateTimeStr}</div>
            </div>
            <div class="qr-edit" data-id="${rem.id}" title="Edit Reminder">✏️</div>
            <div class="qr-del" data-id="${rem.id}">✖</div>
          `;

                        if (rem.completed) {
                            completedList.appendChild(item);
                        } else {
                            activeList.appendChild(item);
                        }
                    });

                    if (activeList.innerHTML === "")
                        activeList.innerHTML =
                            '<div style="color:var(--text-muted); font-size:10px;">No active reminders.</div>';
                    if (completedList.innerHTML === "")
                        completedList.innerHTML =
                            '<div style="color:var(--text-muted); font-size:10px;">No completed reminders.</div>';
                }

                addBtn.addEventListener("click", () => {
                    getAlarmAudioCtx(); // pre-warm AudioContext under user gesture
                    const note = noteInp.value.trim();
                    if (!note) return alert("Please enter a note");

                    if (editingId) {
                        const rem = reminders.find((r) => r.id === editingId);
                        if (rem) {
                            rem.note = note;
                            rem.date = dateInp.value;
                            rem.time = fmt24(timeInp.value);
                            rem.repeat = repeatInp.value;
                        }
                        editingId = null;
                        addBtn.textContent = "Add";
                    } else {
                        reminders.push({
                            id: Date.now().toString(),
                            note,
                            date: dateInp.value,
                            time: fmt24(timeInp.value),
                            repeat: repeatInp.value,
                            completed: false,
                        });
                    }

                    noteInp.value = "";
                    repeatInp.value = "";
                    saveAndRender();
                });

                document.addEventListener("click", (e) => {
                    // Handle check
                    const chk = e.target.closest(".qr-chk");
                    if (chk) {
                        const rem = reminders.find(
                            (r) => r.id === chk.dataset.id,
                        );
                        if (rem) {
                            rem.completed = !rem.completed;
                            saveAndRender();
                        }
                    }

                    // Handle edit
                    const edit = e.target.closest(".qr-edit");
                    if (edit) {
                        const rem = reminders.find(
                            (r) => r.id === edit.dataset.id,
                        );
                        if (rem) {
                            editingId = rem.id;
                            noteInp.value = rem.note;
                            dateInp.value = rem.date;
                            timeInp.value = fmt12(rem.time || "");
                            repeatInp.value = rem.repeat || "";
                            addBtn.textContent = "Update";
                            noteInp.focus();
                        }
                    }

                    // Handle delete
                    const del = e.target.closest(".qr-del");
                    if (del) {
                        if (editingId === del.dataset.id) {
                            editingId = null;
                            addBtn.textContent = "Add";
                            noteInp.value = "";
                            repeatInp.value = "";
                        }
                        reminders = reminders.filter(
                            (r) => r.id !== del.dataset.id,
                        );
                        saveAndRender();
                    }
                });

                render();
                startAlarmChecker();
            });

            // ----- Alarm / Notification Engine -----
            let alarmTimer = null;
            let alarmAudioCtx = null;
            const FIRED_IDS_KEY = "planner-alarms-fired";
            const CHECK_INTERVAL = 15_000; // 15 seconds

            function getAlarmAudioCtx() {
                if (!alarmAudioCtx) {
                    try {
                        const AC = window.AudioContext || window.webkitAudioContext;
                        if (!AC) return null;
                        alarmAudioCtx = new AC();
                    } catch (e) { return null; }
                }
                if (alarmAudioCtx.state === "suspended") {
                    alarmAudioCtx.resume();
                }
                return alarmAudioCtx;
            }

            function getFiredIds() {
                try {
                    return JSON.parse(localStorage.getItem(FIRED_IDS_KEY) || "[]");
                } catch { return []; }
            }

            function markFired(id) {
                const set = new Set(getFiredIds());
                set.add(id);
                localStorage.setItem(FIRED_IDS_KEY, JSON.stringify([...set]));
            }

            let alarmSoundTimer = null;
            let alarmModal = null;

            function playAlarmSound() {
                const ctx = getAlarmAudioCtx();
                if (!ctx) {
                    if (window.playPopSound) { window.playPopSound(true); window.playPopSound(true); }
                    return;
                }
                try {
                    const notes = [880, 660, 880, 660, 880];
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = "sine";
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.2);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.2 + 0.18);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(ctx.currentTime + i * 0.2);
                        osc.stop(ctx.currentTime + i * 0.2 + 0.2);
                    });
                } catch (e) { /* audio not available */ }
            }

            function startAlarmLoop() {
                playAlarmSound();
                alarmSoundTimer = setInterval(playAlarmSound, 1500);
            }

            function stopAlarmLoop() {
                if (alarmSoundTimer) {
                    clearInterval(alarmSoundTimer);
                    alarmSoundTimer = null;
                }
            }

            function dismissAlarm() {
                stopAlarmLoop();
                if (alarmModal && alarmModal.parentNode) {
                    alarmModal.parentNode.removeChild(alarmModal);
                }
                alarmModal = null;
            }

            function showAlarmNotification(reminder) {
                if (alarmModal) return; // already showing one

                startAlarmLoop();

                // Browser notification
                if ("Notification" in window && Notification.permission === "granted") {
                    new Notification("⏰ Reminder!", { body: reminder.note });
                }

                // Centered modal overlay
                const overlay = document.createElement("div");
                overlay.className = "alarm-overlay";
                overlay.innerHTML = `
                    <div class="alarm-modal">
                        <div class="alarm-icon-wrap">⏰</div>
                        <div class="alarm-title">Reminder</div>
                        <div class="alarm-note">${reminder.note}</div>
                        <div class="alarm-dateline">${reminder.date}${reminder.time ? ' at ' + reminder.time : ''}</div>
                        <button class="alarm-dismiss-btn">Dismiss</button>
                    </div>
                `;
                document.body.appendChild(overlay);
                alarmModal = overlay;

                overlay.querySelector(".alarm-dismiss-btn").onclick = (e) => {
                    e.stopPropagation();
                    dismissAlarm();
                };
                overlay.onclick = (e) => {
                    if (e.target === overlay) dismissAlarm();
                };
            }

            function checkAlarms() {
                const reminders = JSON.parse(
                    localStorage.getItem("planner-quick-reminders") || "[]"
                );
                const firedIds = new Set(getFiredIds());
                const now = new Date();
                const today = now.toISOString().split("T")[0];
                const currentMin = now.getHours() * 60 + now.getMinutes();

                reminders.forEach((rem) => {
                    if (rem.completed) return;
                    if (firedIds.has(rem.id)) return;

                    // Check if the reminder's date matches today (or has passed) and time matches within 1 minute
                    const remDate = rem.date || today;
                    if (remDate > today) return; // future date, not yet

                    if (rem.time) {
                        const [h, m] = rem.time.split(":").map(Number);
                        const remMin = h * 60 + m;
                        if (Math.abs(currentMin - remMin) > 2) return;
                    }

                    showAlarmNotification(rem);
                    markFired(rem.id);
                });
            }

            function startAlarmChecker() {
                checkAlarms();
                alarmTimer = setInterval(checkAlarms, CHECK_INTERVAL);
            }
        </script>
        <!-- Alarm modal styles -->
        <style>
            .alarm-overlay {
                position: fixed; inset: 0; z-index: 10002;
                background: rgba(11,11,15,0.7);
                backdrop-filter: blur(6px);
                -webkit-backdrop-filter: blur(6px);
                display: flex; align-items: center; justify-content: center;
                padding: 20px;
                animation: alarmFadeIn 0.3s ease;
            }
            @keyframes alarmFadeIn { from { opacity: 0; } to { opacity: 1; } }

            .alarm-modal {
                background: var(--bg-card, #12121a);
                border: 1px solid rgba(255,200,50,0.35);
                border-radius: 24px;
                padding: 36px 32px 28px;
                max-width: 380px;
                width: 100%;
                text-align: center;
                box-shadow: 0 24px 80px rgba(0,0,0,0.5);
                animation: alarmPopup 0.4s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
                position: relative;
            }
            @keyframes alarmPopup {
                from { transform: scale(0.7) translateY(20px); opacity: 0; }
                to   { transform: scale(1) translateY(0); opacity: 1; }
            }

            .alarm-icon-wrap {
                font-size: 48px; line-height: 1; margin-bottom: 8px;
                animation: alarmPulse 1.2s ease-in-out infinite;
            }
            @keyframes alarmPulse {
                0%, 100% { transform: scale(1); }
                50%      { transform: scale(1.15); }
            }

            .alarm-title {
                font-size: 18px; font-weight: 700; color: #fff;
                margin-bottom: 8px;
            }
            .alarm-note {
                font-size: 14px; color: var(--text-main, #d0d0e0);
                margin-bottom: 4px; line-height: 1.4;
            }
            .alarm-dateline {
                font-size: 11px; color: var(--text-sub, #9090a5);
                margin-bottom: 20px;
            }
            .alarm-dismiss-btn {
                padding: 8px 28px; border: 1px solid var(--border-color, #333);
                border-radius: 10px; background: rgba(255,200,50,0.08);
                color: var(--text-main, #ddd); font-size: 13px; font-weight: 600;
                cursor: pointer; transition: all 0.15s ease; font-family: inherit;
            }
            .alarm-dismiss-btn:hover {
                background: rgba(255,200,50,0.18);
                border-color: rgba(255,200,50,0.5);
                color: #fff;
            }
        </style>
    </body>
</html>
